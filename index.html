<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezo-Cafe Log</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* 簡単なレイアウト設定 */
        body { font-family: sans-serif; margin: 0; padding: 0; }
        .tab-menu { display: flex; background: #eee; padding: 10px; }
        .tab-button { margin-right: 10px; padding: 10px; cursor: pointer; }
        
        /* 地図の枠：高さが0にならないように必ず指定します */
        #viewMapDiv { 
            height: 400px; 
            width: 100%; 
        }
        
        /* タブ切り替え用の非表示クラス */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tab-menu">
        <button class="tab-button" onclick="switchTab('list')">リスト表示</button>
        <button class="tab-button" onclick="switchTab('map')">マップ表示</button>
    </div>

    <div>
        <div id="listView" class="">
            <h2>カフェ日記リスト</h2>
            <div id="diaryList">ここに日記が表示されます</div>
        </div>

        <div id="mapView" class="hidden">
            <h2>訪問マップ</h2>
            <div id="viewMapDiv"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ==========================================
        // 1. 変数の準備（★一番上で全員が使えるようにする）
        // ==========================================
        
        // ★ご自身の本番用 Cloudflare Worker URL に書き換えてください
        const CLOUDFLARE_WORKER_URL = 'https://cafe-pipeline.ryusei-doas-0823.workers.dev/'; 
        
        let activeTagFilter = 'all';  // フィルター用変数
        let viewMap;                  // マップ用変数（ここで空箱を用意）

        // ==========================================
        // 2. タブ切り替え機能
        // ==========================================
        function switchTab(tabName) {
            const listView = document.getElementById('listView');
            const mapView = document.getElementById('mapView');

            if (tabName === 'list') {
                // リストを表示、マップを隠す
                listView.classList.remove('hidden');
                mapView.classList.add('hidden');
            } else if (tabName === 'map') {
                // マップを表示、リストを隠す
                listView.classList.add('hidden');
                mapView.classList.remove('hidden');
                
                // ★マップのタブが開かれた瞬間に、地図を描画・調整する
                initViewMap();
            }
        }

        // ==========================================
        // 3. マップの初期化・描画機能
        // ==========================================
        function initViewMap() {
            // HTMLの中に 'viewMapDiv' という枠が存在するかチェック
            const mapContainer = document.getElementById('viewMapDiv');
            if (!mapContainer) {
                console.error("エラー: 地図を表示するための枠(viewMapDiv)が見つかりません！");
                return;
            }

            // まだ地図が作られていなければ、新しく作る
            if (!viewMap) {
                // ★ここの 'viewMapDiv' がHTMLの id と一致しているか確認！
                viewMap = L.map('viewMapDiv').setView([43.064, 141.35], 13); // 札幌駅周辺の座標

                // 地図の画像を読み込む
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(viewMap);
                
                // ※ここにピン（マーカー）を立てる処理を追加します
                // loadViewMarkers(); 
            }

            // 地図が確実に存在するので、サイズを再計算して綺麗に表示する
            setTimeout(() => {
                viewMap.invalidateSize();
            }, 100); // 100ミリ秒だけ待ってから調整すると、タブ切り替え時のバグを防げます
        }

        // ==========================================
        // 4. データ読み込み処理など（以下略）
        // ==========================================
        // function fetchDiaryData() { ... }
        // function applyFilters() { ... }

    </script>
</body>
</html>
