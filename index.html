<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホでの不用意なズームを防止し、ネイティブアプリ感を出すビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EzoCafe Log</title>

    <!-- Leaflet CSS (マップ描画用) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- 🌟 キャッシュバスター: ?v=2 を付与し最新のCSSを強制読み込み -->
    <link rel="stylesheet" href="./style.css?v=2">
</head>
<body>
    <div class="app-container">
        <!-- ==========================================
             🏷️ アプリヘッダー & ナビゲーション
             ========================================== -->
        <header style="padding: 16px; text-align: center; background-color: var(--card-bg); border-bottom: 1px solid var(--border-color);">
            <h1>☕️ EzoCafe Log</h1>
            <div style="display: flex; gap: 8px; justify-content: center; margin-top: 10px;">
                <button class="btn-secondary" onclick="window.dispatchEvent(new CustomEvent('switch-tab', {detail: {tab: 'record'}}))">✍️ 記録する</button>
                <button class="btn-secondary" onclick="window.dispatchEvent(new CustomEvent('switch-tab', {detail: {tab: 'history'}}))">📚 履歴を見る</button>
            </div>
        </header>

        <!-- ==========================================
             ✍️ 記録タブ (フォーム領域)
             ========================================== -->
        <main id="tab-record" style="padding-top: 16px;">
            <form id="recordForm">
                
                <!-- 1. 店舗名 & サジェスト機能 -->
                <div class="form-group relative">
                    <label for="shopName">店舗名</label>
                    <input type="text" id="shopName" placeholder="店舗名を入力または検索" required autocomplete="off">
                    <input type="hidden" id="shopId">
                    <ul id="shopSuggestList" style="display: none;"></ul>
                </div>

                <!-- 2. 手動マップピッカー起動ボタン -->
                <div class="form-group" style="display: flex; gap: 8px;">
                    <button type="button" class="btn-secondary" id="btnOpenMapPicker" style="flex: 1;">📍 マップから手動選択</button>
                </div>

                <!-- 3. 画像アップロード (複数対応 & 一括ストック) -->
                <div class="form-group">
                    <label>写真の追加 (複数可)</label>
                    <input type="file" id="imageInputSingle" accept="image/jpeg, image/png, image/webp" multiple style="margin-bottom: 8px;">
                    <div style="display: flex; gap: 8px;">
                        <input type="file" id="imageInputBulk" accept="image/jpeg, image/png, image/webp" multiple style="display:none;">
                        <button type="button" class="btn-secondary" onclick="document.getElementById('imageInputBulk').click()" style="flex: 1;">📦 一括未整理ストック</button>
                        <button type="button" class="btn-secondary" id="btnSkipPhoto" style="flex: 1;">⏩ 写真なしで進む</button>
                    </div>
                </div>

                <!-- 4. 画像プレビューエリア -->
                <img id="imagePreview" style="display: none;" alt="単一プレビュー">
                <div id="photoPreviewContainer"></div>
                
                <!-- 5. ステータス通知 -->
                <div id="gpsStatus"></div>
                <div id="bulkStatus"></div>

                <!-- 6. 動的フォームエリア (写真選択 or スキップで展開) -->
                <div id="dynamicFormFields" class="hidden">
                    
                    <div class="form-group">
                        <label>利用形態</label>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <label><input type="radio" name="eatType" value="☕️店内" checked> ☕️店内</label>
                            <label><input type="radio" name="eatType" value="🥡テイクアウト"> 🥡テイクアウト</label>
                            <label><input type="radio" name="eatType" value="🛍️豆・グッズ"> 🛍️豆・グッズ</label>
                            <label><input type="radio" name="eatType" value="🎪間借り・無店舗"> 🎪間借り・無店舗</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="visitedAt">訪問日</label>
                        <input type="date" id="visitedAt" required>
                    </div>

                    <div class="form-group" style="display: flex; gap: 8px;">
                        <div style="flex: 1;">
                            <label for="weatherSelect">天気</label>
                            <select id="weatherSelect">
                                <option value="❓">❓ 不明</option>
                                <option value="☀️">☀️ 晴れ</option>
                                <option value="☁️">☁️ くもり</option>
                                <option value="☔️">☔️ 雨</option>
                                <option value="❄️">❄️ 雪</option>
                            </select>
                        </div>
                        <div style="flex: 1;">
                            <label for="temperature">気温 (℃)</label>
                            <input type="number" id="temperature" placeholder="例: 20">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comment">コメント・メモ</label>
                        <textarea id="comment" rows="3" placeholder="味の感想や店内の雰囲気など"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="tags">タグ (カンマ区切り)</label>
                        <input type="text" id="tags" placeholder="例: 作業向け, 浅煎り">
                    </div>

                    <div class="form-group" style="display: flex; gap: 16px;">
                        <label style="display: flex; align-items: center; gap: 4px;">
                            <input type="checkbox" id="isBookmark"> 💭 行きたい
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px;">
                            <input type="checkbox" id="isDraft"> 📦 未整理
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px;">
                            <input type="checkbox" id="isPublicCheckbox"> 🌍 公開する
                        </label>
                    </div>

                    <!-- 位置情報隠しフィールド -->
                    <input type="hidden" id="latitude">
                    <input type="hidden" id="longitude">
                    <input type="hidden" id="locationSource">

                    <button type="submit" id="submitBtn" class="btn-primary">🚀 記録する</button>
                </div>
            </form>
        </main>

        <!-- ==========================================
             📚 履歴タブ
             ========================================== -->
        <main id="tab-history" class="hidden" style="padding-top: 16px;">
            <div class="form-group">
                <select id="tagFilter" class="form-group">
                    <option value="">すべてのタグ（全件表示）</option>
                </select>
            </div>
            <!-- ここにJS(list.js)からカードがレンダリングされます -->
            <div id="diariesList"></div>
        </main>
    </div>

    <!-- ==========================================
         🗺️ 手動マップピッカー モーダル
         ========================================== -->
    <div id="mapPickerModal" class="hidden">
        <div class="map-modal-content">
            <!-- 🌟 ポカヨケ: map-modal-header-text クラスを付与し、✖ボタンとの被りを完全防止 -->
            <div class="map-modal-header">
                <p class="map-modal-header-text">📍 地図を動かして「＋」をお店に合わせてください</p>
                <button id="closeMapPicker">✖ 閉じる</button>
            </div>
            
            <div id="pickerMap" style="position: relative;">
                <!-- 画面中央の十字カーソル（CSSで絶対配置） -->
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; pointer-events: none; font-size: 24px;">
                    ➕
                </div>
            </div>

            <div class="map-modal-footer">
                <button id="btnConfirmLocation" class="btn-primary" style="margin: 0;">✅ ここを店舗の位置として決定</button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         📦 外部スクリプト & メインロジック
         ========================================== -->
    <!-- Leaflet.js -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- exifr (EXIFメタデータ抽出用) -->
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    
    <!-- 🌟 キャッシュバスター: ?v=2 を付与し最新のJSを強制読み込み -->
    <script type="module" src="./src/app.js?v=2"></script>
    
    <!-- 簡易タブ切り替え用インラインスクリプト -->
    <script>
        window.addEventListener('switch-tab', (e) => {
            const tab = e.detail.tab;
            if (tab === 'record') {
                document.getElementById('tab-record').classList.remove('hidden');
                document.getElementById('tab-history').classList.add('hidden');
            } else if (tab === 'history') {
                document.getElementById('tab-record').classList.add('hidden');
                document.getElementById('tab-history').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
