<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EzoCafe Log</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-content">
        <h1>☕️ EzoCafe Log</h1>

        <div id="tab-record">
            <div class="form-card">
                <form id="recordForm">
                    
                    <div class="form-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed #bdc3c7;">
                        <label for="imageInput" style="color: #2980b9; font-weight: bold;">
                            1. 写真を追加 📸<br>
                            <span style="font-size: 0.8rem; color: #7f8c8d; font-weight: normal;">※複数枚を同時に選択すると、すべて「未整理」として一括ストックされます！</span>
                        </label>
                        <input type="file" id="imageInput" accept="image/*" multiple>
                        <img id="imagePreview" style="display: none;" alt="プレビュー">
                        
                        <label style="display: block; margin-top: 10px; font-size: 0.85rem; color: #7f8c8d; cursor: pointer;">
                            <input type="checkbox" id="isDraft" value="📦">
                            📦 この1枚を「未整理」として仮保存する
                        </label>
                    </div>

                    <div class="form-group relative">
                        <label for="shopName">お店の名前</label>
                        <input type="text" id="shopName" placeholder="例: サッポロ珈琲館" autocomplete="off">
                        <input type="hidden" id="shopId">
                        <ul id="shopSuggestList" class="suggest-list"></ul>
                        
                        <label style="display: block; margin-top: 8px; font-size: 0.85rem; color: #7f8c8d; cursor: pointer;">
                            <input type="checkbox" id="isBookmark" value="💭">
                            💭 まだ行ってないけど「行きたいお店」として登録する
                        </label>
                    </div>

                    <div class="form-group">
                        <label>利用タイプは？</label>
                        <div class="type-selector">
                            <label><input type="radio" name="eatType" value="☕️店内" checked>☕️ 店内</label>
                            <label><input type="radio" name="eatType" value="🥡テイクアウト">🥡 テイクアウト</label>
                            <label><input type="radio" name="eatType" value="🛍️豆・グッズ">🛍️ 物販</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="visitedAt">訪問日</label>
                        <input type="date" id="visitedAt" required>
                    </div>

                    <div class="form-group">
                        <label for="weatherSelect">天気（写真から自動取得・手動変更可）</label>
                        <select id="weatherSelect">
                            <option value="❓">❓ 不明</option>
                            <option value="☀️">☀️ 晴れ</option>
                            <option value="☁️">☁️ くもり</option>
                            <option value="☔️">☔️ 雨</option>
                            <option value="❄️">❄️ 雪</option>
                        </select>
                        <p id="gpsStatus" style="font-size: 0.85em; color: #e74c3c; margin-top: 8px; font-weight: bold; text-align: center;"></p>
                        <input type="hidden" id="latitude">
                        <input type="hidden" id="longitude">
                        <input type="hidden" id="temperature">
                    </div>
                    
                    <div class="form-group">
                        <label for="comment">感想やメモ</label>
                        <textarea id="comment" placeholder="コロンビア・ロスノガレスのデカフェを飲みました。"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="tags">自分でつけるタグ（カンマ区切り・任意）</label>
                        <input type="text" id="tags" placeholder="例: 作業, 癒やし">
                    </div>
                    <button type="submit" id="submitBtn">🚀 記録する</button>
                </form>
            </div>
        </div>

        <div id="tab-history" class="hidden">
            <div id="diariesList" style="padding-bottom: 70px;"></div>
            <div class="fixed-filter">
                <select id="tagFilter">
                    <option value="">すべてのタグ（全件表示）</option>
                </select>
            </div>
        </div>

        <div id="tab-map" class="hidden" style="position: relative;">
            <div style="position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 1000;">
                <input type="text" id="mapSearchInput" placeholder="🔍 店舗名でマップを検索..." autocomplete="off" style="width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid #5d4037; box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-size: 16px; box-sizing: border-box; background: rgba(255, 255, 255, 0.95);">
                <ul id="mapSearchSuggestList" class="suggest-list" style="margin-top: 5px; border-radius: 12px; max-height: 200px;"></ul>
            </div>
            
            <div id="mapView"></div>
        </div>

        <div id="tab-analytics" class="hidden">
            <div class="dashboard-card">
                <h3>☕️ あなたのカフェ開拓データ</h3>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="stat-total-visits">0</div>
                        <div class="stat-label">総記録数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="stat-unique-shops">0</div>
                        <div class="stat-label">開拓店舗数</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="eatTypeChart"></canvas>
                </div>
                <div class="chart-container" style="margin-top: 30px;">
                    <canvas id="tagsChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="hidden">
            <div class="dashboard-card">
                <h3>👤 アナリティクス用属性設定</h3>
                <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 15px;">※ここで設定した属性は記録と一緒に保存され、将来SNS化した際の統計データにのみ利用されます。</p>
                
                <div class="form-group">
                    <label>性別</label>
                    <select id="settingGender">
                        <option value="">選択してください</option>
                        <option value="男性">男性</option>
                        <option value="女性">女性</option>
                        <option value="その他">その他</option>
                        <option value="回答しない">回答しない</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>年代</label>
                    <select id="settingAge">
                        <option value="">選択してください</option>
                        <option value="10代">10代</option>
                        <option value="20代">20代</option>
                        <option value="30代">30代</option>
                        <option value="40代">40代</option>
                        <option value="50代">50代</option>
                        <option value="60代以上">60代以上</option>
                    </select>
                </div>

                <button type="button" onclick="saveSettings()" style="background-color: #3498db; margin-top: 15px;">💾 設定をスマホに保存</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active" onclick="switchTab('record', this)">
            <span class="nav-icon">📝</span>
            <span class="nav-label">記録</span>
        </a>
        <a href="#" class="nav-item" onclick="switchTab('history', this)">
            <span class="nav-icon">📚</span>
            <span class="nav-label">履歴</span>
        </a>
        <a href="#" class="nav-item" onclick="switchTab('map', this)">
            <span class="nav-icon">🗺️</span>
            <span class="nav-label">マップ</span>
        </a>
        <a href="#" class="nav-item" onclick="switchTab('analytics', this)">
            <span class="nav-icon">📊</span>
            <span class="nav-label">分析</span>
        </a>
        <a href="#" class="nav-item" onclick="switchTab('settings', this)">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">設定</span>
        </a>
    </div>

    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="map.js"></script>
    <script src="analytics.js"></script>
    <script src="main.js"></script>
</body>
</html>
