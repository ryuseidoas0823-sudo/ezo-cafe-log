<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EzoCafe Log</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- 🌟 キャッシュバスター: ?v=4 に更新 -->
    <link rel="stylesheet" href="./style.css?v=4">
</head>
<body>
    <div class="app-container">
        <!-- ==========================================
             🏷️ アプリヘッダー
             ========================================== -->
        <header style="padding: 16px; text-align: center; background-color: var(--card-bg); border-bottom: 1px solid var(--border-color);">
            <h1 style="margin: 0;">☕️ EzoCafe Log</h1>
        </header>

        <!-- ==========================================
             ✍️ 1. 記録タブ (フォーム領域)
             ========================================== -->
        <main id="tab-record" class="tab-content" style="padding-top: 16px;">
            <form id="recordForm">
                <div class="form-group relative">
                    <label for="shopName">店舗名</label>
                    <input type="text" id="shopName" placeholder="店舗名を入力または検索" required autocomplete="off">
                    <input type="hidden" id="shopId">
                    <ul id="shopSuggestList" style="display: none;"></ul>
                </div>

                <div class="form-group" style="display: flex; gap: 8px;">
                    <button type="button" class="btn-secondary" id="btnOpenMapPicker" style="flex: 1;">📍 マップから手動選択</button>
                </div>

                <div class="form-group">
                    <label>写真の追加 (複数可)</label>
                    <input type="file" id="imageInputSingle" accept="image/jpeg, image/png, image/webp" multiple style="margin-bottom: 8px;">
                    <div style="display: flex; gap: 8px;">
                        <input type="file" id="imageInputBulk" accept="image/jpeg, image/png, image/webp" multiple style="display:none;">
                        <button type="button" class="btn-secondary" onclick="document.getElementById('imageInputBulk').click()" style="flex: 1;">📦 一括未整理ストック</button>
                        <button type="button" class="btn-secondary" id="btnSkipPhoto" style="flex: 1;">⏩ 写真なしで進む</button>
                    </div>
                </div>

                <div id="photoPreviewContainer"></div>
                <div id="gpsStatus"></div>
                <div id="bulkStatus"></div>

                <div id="dynamicFormFields" class="hidden">
                    <div class="form-group">
                        <label>利用形態</label>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <label><input type="radio" name="eatType" value="☕️店内" checked> ☕️店内</label>
                            <label><input type="radio" name="eatType" value="🥡テイクアウト"> 🥡テイクアウト</label>
                            <label><input type="radio" name="eatType" value="🛍️豆・グッズ"> 🛍️豆・グッズ</label>
                            <label><input type="radio" name="eatType" value="🎪間借り・無店舗"> 🎪間借り・無店舗</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="visitedAt">訪問日</label>
                        <input type="date" id="visitedAt" required>
                    </div>

                    <div class="form-group" style="display: flex; gap: 8px;">
                        <div style="flex: 1;">
                            <label for="weatherSelect">天気</label>
                            <select id="weatherSelect">
                                <option value="❓">❓ 不明</option>
                                <option value="☀️">☀️ 晴れ</option>
                                <option value="☁️">☁️ くもり</option>
                                <option value="☔️">☔️ 雨</option>
                                <option value="❄️">❄️ 雪</option>
                            </select>
                        </div>
                        <div style="flex: 1;">
                            <label for="temperature">気温 (℃)</label>
                            <input type="number" id="temperature" placeholder="例: 20">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comment">コメント・メモ</label>
                        <textarea id="comment" rows="3" placeholder="味の感想や店内の雰囲気など"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="tags">タグ (カンマ区切り)</label>
                        <input type="text" id="tags" placeholder="例: 作業向け, 浅煎り">
                    </div>

                    <div class="form-group" style="display: flex; gap: 16px;">
                        <label style="display: flex; align-items: center; gap: 4px;"><input type="checkbox" id="isBookmark"> 💭 行きたい</label>
                        <label style="display: flex; align-items: center; gap: 4px;"><input type="checkbox" id="isDraft"> 📦 未整理</label>
                        <label style="display: flex; align-items: center; gap: 4px;"><input type="checkbox" id="isPublicCheckbox"> 🌍 公開</label>
                    </div>

                    <input type="hidden" id="latitude">
                    <input type="hidden" id="longitude">
                    <input type="hidden" id="locationSource">
                    <button type="submit" id="submitBtn" class="btn-primary">🚀 記録する</button>
                </div>
            </form>
        </main>

        <!-- ==========================================
             📚 2. 履歴タブ
             ========================================== -->
        <main id="tab-history" class="tab-content hidden" style="padding-top: 16px;">
            <div class="form-group">
                <select id="tagFilter" class="form-group">
                    <option value="">すべてのタグ（全件表示）</option>
                </select>
            </div>
            <div id="diariesList"></div>
        </main>

        <!-- ==========================================
             🗺️ 3. マップタブ
             ========================================== -->
        <main id="tab-map" class="tab-content hidden" style="padding-top: 16px; height: calc(100vh - 150px); display: flex; flex-direction: column;">
            <div class="form-group">
                <select id="mapTagFilter" style="width: 100%;">
                    <option value="">🏷️ すべての気分・目的・タグ</option>
                </select>
            </div>
            <!-- 🌟 重大バグ修正: mainMap を viewMap に変更しJSのクラッシュを解消 -->
            <div id="viewMap" style="flex-grow: 1; width: 100%; border-radius: 8px; z-index: 1;"></div>
        </main>

        <!-- ==========================================
             📊 4. アナリティクスタブ
             ========================================== -->
        <main id="tab-analytics" class="tab-content hidden" style="padding: 16px;">
            <h2 style="text-align: center; margin-bottom: 20px;">📊 記録の分析</h2>
            <div id="analyticsContent">
                <p style="text-align:center; color: var(--text-sub);">データを集計中...</p>
            </div>
        </main>

        <!-- ==========================================
             ⚙️ 5. 設定タブ
             ========================================== -->
        <main id="tab-settings" class="tab-content hidden" style="padding: 16px;">
            <h2 style="margin-bottom: 20px;">⚙️ ユーザー設定</h2>
            <div class="form-group">
                <label>性別</label>
                <select id="userGender">
                    <option value="未設定">未設定</option>
                    <option value="男性">男性</option>
                    <option value="女性">女性</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="form-group">
                <label>年代</label>
                <select id="userAge">
                    <option value="未設定">未設定</option>
                    <option value="10代">10代</option>
                    <option value="20代">20代</option>
                    <option value="30代">30代</option>
                    <option value="40代">40代</option>
                    <option value="50代以上">50代以上</option>
                </select>
            </div>
            <div class="form-group" style="margin-top: 24px;">
                <button id="btnSaveSettings" class="btn-primary">💾 設定を保存する</button>
            </div>
        </main>

        <!-- ==========================================
             📱 ボトムナビゲーション
             ========================================== -->
        <nav style="position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; padding-bottom: calc(10px + env(safe-area-inset-bottom));">
            <button class="nav-btn" data-tab="record" style="background:none; color:var(--primary-color); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold;">
                <span style="font-size:20px; margin-bottom:4px;">✍️</span>記録
            </button>
            <button class="nav-btn" data-tab="history" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold;">
                <span style="font-size:20px; margin-bottom:4px;">📚</span>履歴
            </button>
            <button class="nav-btn" data-tab="map" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold;">
                <span style="font-size:20px; margin-bottom:4px;">🗺️</span>マップ
            </button>
            <button class="nav-btn" data-tab="analytics" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold;">
                <span style="font-size:20px; margin-bottom:4px;">📊</span>分析
            </button>
            <button class="nav-btn" data-tab="settings" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold;">
                <span style="font-size:20px; margin-bottom:4px;">⚙️</span>設定
            </button>
        </nav>
    </div>

    <!-- ==========================================
         🗺️ 手動マップピッカー モーダル
         ========================================== -->
    <div id="mapPickerModal" class="hidden">
        <div class="map-modal-content">
            <div class="map-modal-header">
                <p class="map-modal-header-text">📍 地図を動かして「＋」をお店に合わせてください</p>
                <button id="closeMapPicker">✖ 閉じる</button>
            </div>
            <div id="pickerMap" style="position: relative;">
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; pointer-events: none; font-size: 24px;">➕</div>
            </div>
            <div class="map-modal-footer">
                <button id="btnConfirmLocation" class="btn-primary" style="margin: 0;">✅ ここを店舗の位置として決定</button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         📦 外部スクリプト & メインロジック
         ========================================== -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <!-- キャッシュバスターを v=4 に更新 -->
    <script type="module" src="./src/app.js?v=4"></script>
    
    <!-- 📱 ボトムナビゲーション＆タブ切り替え制御 -->
    <script>
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tabName = e.currentTarget.dataset.tab;
                window.dispatchEvent(new CustomEvent('switch-tab', {detail: {tab: tabName}}));
            });
        });

        window.addEventListener('switch-tab', (e) => {
            const tab = e.detail.tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById('tab-' + tab);
            if (target) target.classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                if(b.dataset.tab === tab) {
                    b.style.color = 'var(--primary-color)';
                } else {
                    b.style.color = 'var(--text-sub)';
                }
            });
            window.scrollTo(0, 0);
        });
    </script>
</body>
</html>
