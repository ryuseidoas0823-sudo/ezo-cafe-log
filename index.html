<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EzoCafe Log</title>
    
    <!-- 🗺️ Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- 📸 画像処理ライブラリ (復活) -->
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- 🌟 キャッシュバスター: 最新版の v=9 に更新 -->
    <link rel="stylesheet" href="./style.css?v=9">
    
    <style>
        /* 🌟 マップ用ボトムシートのCSS (ネイティブアプリ水準のUXを復旧) */
        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg, #ffffff);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            padding: 24px 20px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .bottom-sheet.active {
            bottom: 0;
        }
        .close-sheet-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ==========================================
             🏷️ アプリヘッダー
             ========================================== -->
        <header style="padding: 16px; text-align: center; background-color: var(--card-bg); border-bottom: 1px solid var(--border-color);">
            <h1 style="margin: 0;">☕️ EzoCafe Log</h1>
        </header>

        <!-- ==========================================
             ✍️ 1. 記録タブ (フォーム領域) 
             ========================================== -->
        <main id="tab-record" class="tab-content" style="padding-top: 16px;">
            <form id="recordForm">
                <div class="form-group relative">
                    <label for="shopName">店舗名</label>
                    <input type="text" id="shopName" placeholder="店舗名を入力または検索" required autocomplete="off">
                    <input type="hidden" id="shopId">
                    <ul id="shopSuggestList" style="display: none;"></ul>
                </div>

                <div class="form-group" style="display: flex; gap: 8px;">
                    <button type="button" class="btn-secondary" id="btnOpenMapPicker" style="flex: 1;">📍 マップから手動選択</button>
                </div>

                <div class="form-group">
                    <label>写真の追加 (複数可)</label>
                    <input type="file" id="imageInputSingle" accept="image/jpeg, image/png, image/webp" multiple style="margin-bottom: 8px;">
                    <div style="display: flex; gap: 8px;">
                        <input type="file" id="imageInputBulk" accept="image/jpeg, image/png, image/webp" multiple style="display:none;">
                        <button type="button" class="btn-secondary" onclick="document.getElementById('imageInputBulk').click()" style="flex: 1;">📦 一括未整理ストック</button>
                        <button type="button" class="btn-secondary" id="btnSkipPhoto" style="flex: 1;">⏩ 写真なしで進む</button>
                    </div>
                </div>

                <div id="photoPreviewContainer"></div>
                <div id="gpsStatus"></div>
                <div id="bulkStatus"></div>

                <div id="dynamicFormFields" class="hidden">
                    <div class="form-group">
                        <label>利用形態</label>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <label><input type="radio" name="eatType" value="☕️店内" checked> ☕️店内</label>
                            <label><input type="radio" name="eatType" value="🥡テイクアウト"> 🥡テイクアウト</label>
                            <label><input type="radio" name="eatType" value="🛍️豆・グッズ"> 🛍️豆・グッズ</label>
                            <label><input type="radio" name="eatType" value="🎪間借り・無店舗"> 🎪間借り・無店舗</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="visitedAt">訪問日</label>
                        <input type="date" id="visitedAt" required>
                    </div>

                    <div class="form-group" style="display: flex; gap: 8px;">
                        <div style="flex: 1;">
                            <label for="weatherSelect">天気</label>
                            <select id="weatherSelect">
                                <option value="❓">❓ 不明</option>
                                <option value="☀️">☀️ 晴れ</option>
                                <option value="☁️">☁️ くもり</option>
                                <option value="☔️">☔️ 雨</option>
                                <option value="❄️">❄️ 雪</option>
                            </select>
                        </div>
                        <div style="flex: 1;">
                            <label for="temperature">気温 (℃)</label>
                            <input type="number" id="temperature" placeholder="例: 20">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comment">コメント・メモ</label>
                        <textarea id="comment" rows="3" placeholder="味の感想や店内の雰囲気など"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="tags">タグ (カンマ区切り)</label>
                        <input type="text" id="tags" placeholder="例: 作業向け, 浅煎り">
                    </div>

                    <div class="form-group" style="display: flex; gap: 16px;">
                        <label style="display: flex; align-items: center; gap: 4px;"><input type="checkbox" id="isBookmark"> 💭 行きたい</label>
                        <label style="display: flex; align-items: center; gap: 4px;"><input type="checkbox" id="isDraft"> 📦 未整理</label>
                        <label style="display: flex; align-items: center; gap: 4px;"><input type="checkbox" id="isPublicCheckbox"> 🌍 公開</label>
                    </div>

                    <input type="hidden" id="latitude">
                    <input type="hidden" id="longitude">
                    <input type="hidden" id="locationSource">
                    <button type="submit" id="submitBtn" class="btn-primary">🚀 記録する</button>
                </div>
            </form>
        </main>

        <!-- ==========================================
             📚 2. 履歴タブ (未整理フィルター復旧)
             ========================================== -->
        <main id="tab-history" class="tab-content hidden" style="padding-top: 16px;">
            <div class="form-group" style="display: flex; gap: 8px; align-items: center; margin-bottom: 15px;">
                <select id="tagFilter" class="form-group" style="flex: 1; padding: 8px; margin-bottom: 0;">
                    <option value="">すべてのタグ（全件表示）</option>
                </select>
                <!-- 🌟 復旧: 業務効率化に必須の未整理フィルター -->
                <label style="display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: rgba(0,0,0,0.05); border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: var(--text-main); white-space: nowrap;">
                    <input type="checkbox" id="unorganizedFilter"> 📦 未整理のみ
                </label>
            </div>
            
            <div id="diariesList"></div>
        </main>

        <!-- ==========================================
             🗺️ 3. マップタブ (検索＆保存機能復旧)
             ========================================== -->
        <main id="tab-map" class="tab-content hidden" style="padding-top: 16px; height: calc(100vh - 150px); display: flex; flex-direction: column;">
            <div class="form-group" style="margin-bottom: 8px;">
                <input type="text" id="mapSearchInput" placeholder="🔍 店名・キーワードで絞り込み" autocomplete="off" style="width: 100%; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 12px; font-size: 16px;">
            </div>
            <div class="form-group">
                <select id="mapTagFilter" style="width: 100%; padding: 8px;">
                    <option value="">🏷️ すべての気分・目的・タグ</option>
                </select>
            </div>

            <!-- 📸 マップ画像ダウンロードボタン復旧 -->
            <button id="btn-save-map-image" onclick="window.downloadMapImage()" style="margin-bottom: 10px; background: #2c3e50; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;">
                📸 現在のマップを画像として保存
            </button>

            <!-- viewMapに変更済の安全なコンテナ -->
            <div id="viewMap" style="flex-grow: 1; width: 100%; border-radius: 8px; z-index: 1; border: 1px solid var(--border-color);"></div>

            <!-- 📸 マップ画像生成用のウォーターマーク -->
            <div id="map-watermark-template" style="display: none; position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999; text-align: right; border: 2px solid #5d4037;">
                <h3 style="margin: 0; color: #5d4037; font-size: 1.2rem; font-weight: 900;">☕️ EzoCafe Log</h3>
                <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #7f8c8d; font-weight: bold;">My Cafe Map</p>
                <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: #2c3e50;">開拓した店舗数: <span id="watermark-shop-count" style="font-size: 1.2rem; color: #e67e22; font-weight: 900;">0</span> 店舗</p>
            </div>
        </main>

        <!-- ==========================================
             📊 4. アナリティクスタブ
             ========================================== -->
        <main id="tab-analytics" class="tab-content hidden" style="padding: 16px;">
            <h2 style="text-align: center; margin-bottom: 20px;">📊 記録の分析</h2>
            <div id="analyticsContent">
                <p style="text-align:center; color: var(--text-sub);">データを集計中...</p>
            </div>
        </main>

        <!-- ==========================================
             ⚙️ 5. 設定タブ (QA・管理者機能復旧)
             ========================================== -->
        <main id="tab-settings" class="tab-content hidden" style="padding: 16px;">
            <h2 style="margin-bottom: 20px;">⚙️ ユーザー設定</h2>
            <div class="form-group">
                <label>性別</label>
                <select id="userGender">
                    <option value="未設定">未設定</option>
                    <option value="男性">男性</option>
                    <option value="女性">女性</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="form-group">
                <label>年代</label>
                <select id="userAge">
                    <option value="未設定">未設定</option>
                    <option value="10代以下">10代以下</option>
                    <option value="20代">20代</option>
                    <option value="30代">30代</option>
                    <option value="40代">40代</option>
                    <option value="50代">50代</option>
                    <option value="60代以上">60代以上</option>
                </select>
            </div>
            <div class="form-group" style="margin-top: 24px;">
                <button id="btnSaveSettings" class="btn-primary">💾 設定を保存する</button>
            </div>
            
            <!-- 🌟 開発・テスト用アカウント切替メニュー (復旧) -->
            <div style="margin-top: 30px; padding: 15px; background: rgba(41, 128, 185, 0.05); border: 1px dashed #2980b9; border-radius: 8px;">
                <h3 style="margin-top: 0; color: #2980b9; font-size: 1rem;">🧪 テスト用アカウント切替</h3>
                <p style="font-size: 0.8rem; color: #7f8c8d; margin-bottom: 12px;">権限別のUI/API挙動を検証します。</p>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button onclick="window.switchTestUser('test-user-free-001')" class="btn-secondary" style="border-color: #bdc3c7; color: #2c3e50;">👤 無課金 (Free)</button>
                    <button onclick="window.switchTestUser('test-user-premium-001')" class="btn-secondary" style="border-color: #f1c40f; color: #d35400;">✨ 課金 (Premium)</button>
                    <button onclick="window.switchTestUser('test-user-business-001')" class="btn-secondary" style="border-color: #3498db; color: #2980b9;">🏢 店舗側 (Business)</button>
                    <button onclick="window.switchTestUser('reset')" class="btn-secondary" style="border-color: #95a5a6; color: #7f8c8d; margin-top: 8px;">🔄 アカウントをリセット</button>
                </div>
                <p style="font-size: 0.75rem; color: #34495e; margin-top: 10px; text-align: center;">現在のUUID: <br><span id="currentTestUuidDisplay" style="font-weight:bold; word-break: break-all;"></span></p>
            </div>

            <div style="text-align: center; margin-top: 40px; padding-bottom: 20px;">
                <button onclick="window.upgradeToAdmin()" class="btn-secondary" style="opacity: 0.3; font-size: 0.75rem; border: none; background: transparent;">
                    🔑 Admin Mode (管理者昇格)
                </button>
            </div>
        </main>

        <!-- ==========================================
             📱 ボトムナビゲーション 
             ========================================== -->
        <nav style="position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; padding-bottom: calc(10px + env(safe-area-inset-bottom));">
            <button class="nav-btn" data-tab="record" style="background:none; color:var(--primary-color); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold; border:none; cursor:pointer;">
                <span style="font-size:20px; margin-bottom:4px;">✍️</span>記録
            </button>
            <button class="nav-btn" data-tab="history" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold; border:none; cursor:pointer;">
                <span style="font-size:20px; margin-bottom:4px;">📚</span>履歴
            </button>
            <button class="nav-btn" data-tab="map" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold; border:none; cursor:pointer;">
                <span style="font-size:20px; margin-bottom:4px;">🗺️</span>マップ
            </button>
            <button class="nav-btn" data-tab="analytics" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold; border:none; cursor:pointer;">
                <span style="font-size:20px; margin-bottom:4px;">📊</span>分析
            </button>
            <button class="nav-btn" data-tab="settings" style="background:none; color:var(--text-sub); display:flex; flex-direction:column; align-items:center; font-size:11px; font-weight:bold; border:none; cursor:pointer;">
                <span style="font-size:20px; margin-bottom:4px;">⚙️</span>設定
            </button>
        </nav>
    </div>

    <!-- ==========================================
         🗺️ マップ用 店舗詳細ボトムシート (復旧)
         ========================================== -->
    <div id="shopBottomSheet" class="bottom-sheet">
        <button class="close-sheet-btn" onclick="document.getElementById('shopBottomSheet').classList.remove('active')">✖</button>
        <div id="bottomSheetContent"></div>
    </div>

    <!-- ==========================================
         🗺️ 手動マップピッカー モーダル (住所検索復旧)
         ========================================== -->
    <div id="mapPickerModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 3000; display: flex; flex-direction: column;">
        <div style="background: white; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
            <span>📍 地図を動かして「＋」をお店に</span>
            <button id="closeMapPicker" style="background: none; border: none; font-size: 20px; cursor: pointer;">✖</button>
        </div>
        
        <!-- 🌟 復旧：住所・市区町村検索機能 -->
        <div style="background: white; padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; gap: 8px;">
            <input type="text" id="mapPickerSearchInput" placeholder="🔍 市区町村・住所を入力" autocomplete="off" style="flex: 1; border: 1px solid #ccc; border-radius: 8px; padding: 8px; font-size: 14px;">
            <button type="button" id="btnMapPickerSearch" class="btn-secondary" style="margin: 0; padding: 8px 15px;">検索</button>
        </div>

        <div id="pickerMap" style="flex-grow: 1; position: relative; width: 100%;">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; pointer-events: none; font-size: 32px; text-shadow: 0 0 5px white;">➕</div>
        </div>
        <div style="background: white; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));">
            <button id="btnConfirmLocation" class="btn-primary" style="margin: 0; width: 100%;">✅ ここを店舗の位置として決定</button>
        </div>
    </div>

    <!-- ==========================================
         📦 外部スクリプト & メインロジック
         ========================================== -->
    <script type="module" src="./src/app.js?v=9"></script>
    
    <!-- 📱 ボトムナビゲーション＆タブ切り替え・QAツール制御 (完全復旧) -->
    <script>
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tabName = e.currentTarget.dataset.tab;
                window.dispatchEvent(new CustomEvent('switch-tab', {detail: {tab: tabName}}));
            });
        });

        window.addEventListener('switch-tab', (e) => {
            const tab = e.detail.tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById('tab-' + tab);
            if (target) target.classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                if(b.dataset.tab === tab) {
                    b.style.color = 'var(--primary-color)';
                } else {
                    b.style.color = 'var(--text-sub)';
                }
            });
            window.scrollTo(0, 0);
        });

        // 🌟 復旧：テスト用アカウント切替ロジック
        window.switchTestUser = function(uuid) {
            if (uuid === 'reset') {
                if (confirm("テストモードを終了し、通常のアカウントに戻しますか？")) {
                    localStorage.removeItem('ezo_user_uuid');
                    alert("リセットしました。ページを再読み込みします。");
                    location.reload();
                }
                return;
            }

            const roleNames = {
                'test-user-free-001': '無課金 (Free)',
                'test-user-premium-001': '課金 (Premium)',
                'test-user-business-001': '店舗側 (Business)'
            };

            if (confirm(`「${roleNames[uuid]}」アカウントに切り替えますか？`)) {
                localStorage.setItem('ezo_user_uuid', uuid);
                alert(`${roleNames[uuid]} に切り替えました！`);
                location.reload();
            }
        };

        // 初期ロード時に現在のUUIDを表示
        document.addEventListener('DOMContentLoaded', () => {
            const uuidDisplay = document.getElementById('currentTestUuidDisplay');
            if (uuidDisplay) {
                uuidDisplay.textContent = localStorage.getItem('ezo_user_uuid') || '未設定 (自動生成されます)';
            }
        });

        // 🌟 復旧：管理者（Admin）昇格コマンド
        window.upgradeToAdmin = async function() {
            if (!confirm("裏コマンド：管理者（Admin）権限を取得しますか？")) return;
            
            try {
                const API_BASE_URL = window.API_BASE_URL || "https://cafe-log-api.m-6cf.workers.dev";
                const userUuid = localStorage.getItem('ezo_user_uuid');
                
                if (!userUuid) {
                    alert("ユーザーIDが見つかりません。一度履歴などを読み込んでからお試しください。");
                    return;
                }
                
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Ezo-User-UUID': userUuid
                    },
                    body: JSON.stringify({ action: 'upgrade_admin' })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert("👑 管理者権限を取得しました！設定を反映させるためページを再読み込みします。");
                    location.reload(); 
                } else {
                    alert("昇格エラー: " + (result.error || "不明なエラー"));
                }
            } catch (error) {
                console.error("Admin Upgrade Error:", error);
                alert("通信エラーが発生しました。Cloudflare WorkerのURLが正しいか確認してください。");
            }
        };
    </script>
</body>
</html>
