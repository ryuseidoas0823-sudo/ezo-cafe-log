# ==========================================
# ⚙️ 基本設定 (Core Configuration)
# ==========================================
name = "cafe-pipeline"
# ▼ ここを実際のファイルの場所（srcフォルダの中）に合わせて修正します！
main = "src/worker.js" 
compatibility_date = "2026-07-09"
account_id = "32baac0d4fff9a0eaaf437ec150dc723" 

# ==========================================
# 💾 D1データベース (Relational Database)
# 業務ログやステータスを堅牢に一元管理するデータ基盤
# ==========================================
[[d1_databases]]
binding = "DB"
database_name = "cafe-db"
database_id = "b4ab1090-8997-4831-874a-53fdcda65eeb" 

# ==========================================
# 📦 R2オブジェクトストレージ (Object Storage)
# 現場の証跡データ（画像など）をセキュアかつ低コストで保存
# ==========================================
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ezocafe-images"

# ==========================================
# 🤖 AIバインディング (Workers AI)
# テキスト解析や将来的な非定型データの構造化を担う
# ==========================================
[ai]
binding = "AI"

# ==========================================
# 🌐 環境変数 (Environment Variables)
# 外部システム（業務フロー）との統合エンドポイント
# ==========================================
[vars]
# 業務自動化の要となるGAS Webhook URL
GAS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyOp-cHTDluKEAXD3Qg2nQl2SOTHpDl0SgejDaQKKybN4tT4ySfREIAM1WQyFf0bpd5/exec"

# ==========================================
# 🚀 開発環境用オーバーライド (プレビュー環境用)
# ※ローカル開発やテスト環境で別のDB/設定を使いたい場合の予約枠
# ==========================================
# [env.dev.vars]
# GAS_WEBHOOK_URL = "開発用GASのURLがあればここへ"